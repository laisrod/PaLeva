name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend-rspec:
    name: Backend - RSpec
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.4"
          bundler-cache: true

      - name: Install Ruby dependencies
        run: bundle install

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend JS dependencies
        run: npm ci

      - name: Prepare test database
        run: RAILS_ENV=test bundle exec bin/rails db:prepare

      - name: Run RSpec
        run: bundle exec rspec spec/requests/api/v1/omniauth_callbacks_spec.rb

  frontend-vitest:
    name: Frontend - Vitest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:run
